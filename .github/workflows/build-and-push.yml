name: Build and Push Docker Image

on:
  push:
    branches:
      - main
      - dev
    tags:
      - "v*"
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "attached_assets/**"
      - ".github/workflows/build-and-push.yml"
      - "VERSION"
  pull_request:
    branches:
      - main
    paths:
      - "Dockerfile"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - "vite.config.ts"
      - "client/**"
      - "server/**"
      - "shared/**"
      - "attached_assets/**"
      - ".github/workflows/build-and-push.yml"
  workflow_dispatch:
    inputs:
      tag:
        description: "Image tag (e.g., v1.0.0)"
        required: false
        default: "latest"

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    uses: raolivei/github-workflows/.github/workflows/docker-build.yml@main
    with:
      image-name: northwaysignal-website
      context: .
      platforms: linux/arm64
    secrets:
      REGISTRY_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  make-public:
    needs: build
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - name: Make package public
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          curl -X PATCH \
            -H "Accept: application/vnd.github+json" \
            -H "Authorization: Bearer $GH_TOKEN" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/user/packages/container/northwaysignal-website/visibility \
            -d '{"visibility":"public"}' || echo "Note: Package visibility may already be public or requires manual configuration"
