apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Matches cluster GitOps: Eldertree deploys this app in namespace pitanga (see pi-fleet pitanga HelmRelease).
namespace: pitanga

resources:
  - deployment.yaml
  - service.yaml
  - ingress.yaml

commonLabels:
  app: northwaysignal-website
  cluster: eldertree



